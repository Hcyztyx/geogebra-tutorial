name: Deploy to Tencent CloudBase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli

      - name: Deploy to CloudBase
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: |
          cloudbase login --secretId $TCB_SECRET_ID --secretKey $TCB_SECRET_KEY
          cloudbase hosting:deploy ./geogebra-tutorial --env $TCB_ENV_ID
